databases:
  - name: stock-analyzer-db
    plan: free
    databaseName: stock_analyzer
    user: stock_user

services:
  - type: web
    name: stock-analyzer-app
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn web_app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stock-analyzer-db
          property: connectionString
      - key: PORTFOLIO_SOURCES
        value: "local"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
