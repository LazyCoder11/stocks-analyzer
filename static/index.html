<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Analyzer — Portfolio Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e1a;
    --bg2: #0f1424;
    --card: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --red: #ff5f6d;
    --green: #00d4aa;
    --text: #e8eaf6;
    --muted: #8892a4;
    --radius: 16px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #1a1040 0%, #0f1424 100%);
    border-bottom: 1px solid var(--card-border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(20px);
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { font-size: 28px; }
  .logo h1 { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #6c63ff, #00d4aa); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .logo span { font-size: 12px; color: var(--muted); display: block; font-weight: 400; margin-top: -2px; }
  .header-actions { display: flex; gap: 12px; align-items: center; }

  /* ── Buttons ── */
  .btn {
    padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
    transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary { background: linear-gradient(135deg, #6c63ff, #8b83ff); color: #fff; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(108,99,255,0.4); }
  .btn-success { background: linear-gradient(135deg, #00d4aa, #00b894); color: #fff; }
  .btn-success:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(0,212,170,0.4); }
  .btn-danger { background: rgba(255,95,109,0.15); color: var(--red); border: 1px solid rgba(255,95,109,0.3); }
  .btn-danger:hover { background: rgba(255,95,109,0.25); }
  .btn-ghost { background: var(--card); color: var(--text); border: 1px solid var(--card-border); }
  .btn-ghost:hover { background: rgba(255,255,255,0.08); }
  .btn-sm { padding: 6px 14px; font-size: 13px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  /* ── Summary Cards ── */
  .main { max-width: 1200px; margin: 0 auto; padding: 32px; }
  .summary-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px; margin-bottom: 32px;
  }
  .summary-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: var(--radius); padding: 20px;
    transition: all 0.2s;
  }
  .summary-card:hover { background: rgba(255,255,255,0.06); transform: translateY(-2px); }
  .summary-card .label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; }
  .summary-card .value { font-size: 22px; font-weight: 700; }
  .summary-card .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .up { color: var(--green); }
  .down { color: var(--red); }

  /* ── Section Header ── */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .section-header h2 { font-size: 18px; font-weight: 600; }

  /* ── Table ── */
  .table-wrap { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: rgba(255,255,255,0.04); }
  th { padding: 14px 16px; text-align: left; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  td { padding: 16px; font-size: 14px; border-top: 1px solid var(--card-border); }
  tr:hover td { background: rgba(255,255,255,0.03); }
  .symbol-cell { font-weight: 700; font-size: 15px; }
  .exchange-badge {
    display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px;
    font-weight: 600; background: rgba(108,99,255,0.2); color: #8b83ff; margin-left: 6px;
  }
  .company-name { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .sector-tag { font-size: 11px; color: var(--muted); background: rgba(255,255,255,0.06); padding: 2px 8px; border-radius: 20px; }
  .live-price { font-weight: 600; }
  .pnl-up { color: var(--green); font-weight: 600; }
  .pnl-down { color: var(--red); font-weight: 600; }
  .loading-price { color: var(--muted); font-size: 12px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 56px; margin-bottom: 16px; }
  .empty-state p { font-size: 16px; margin-bottom: 24px; }

  /* ── Modal ── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 200; display: none; align-items: center; justify-content: center; }
  .overlay.active { display: flex; }
  .modal {
    background: #131929; border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px; padding: 32px; width: 100%; max-width: 520px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal h3 { font-size: 20px; font-weight: 700; margin-bottom: 24px; }

  /* ── Form ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 13px; font-weight: 500; color: var(--muted); }
  input, select {
    padding: 11px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px;
    transition: all 0.2s; outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); background: rgba(108,99,255,0.08); }
  input::placeholder { color: var(--muted); }
  select option { background: #131929; }

  .lookup-hint { font-size: 12px; margin-top: 4px; min-height: 18px; transition: all .2s; }
  .lookup-ok { color: var(--green); }
  .lookup-err { color: var(--red); }

  .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 28px; }

  /* ── Toast ── */
  .toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 10px; }
  .toast {
    padding: 14px 20px; border-radius: 12px; font-size: 14px; font-weight: 500;
    display: flex; align-items: center; gap: 10px; min-width: 280px;
    animation: slideIn 0.3s ease; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
  .toast.success { background: rgba(0,212,170,0.15); border: 1px solid rgba(0,212,170,0.3); color: var(--green); }
  .toast.error   { background: rgba(255,95,109,0.15); border: 1px solid rgba(255,95,109,0.3); color: var(--red); }
  .toast.info    { background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.3); color: #8b83ff; }
  @keyframes slideIn { from{transform:translateX(40px);opacity:0} to{transform:translateX(0);opacity:1} }

  /* ── Analysis trigger ── */
  .analysis-bar {
    background: linear-gradient(135deg, rgba(108,99,255,0.1), rgba(0,212,170,0.1));
    border: 1px solid rgba(108,99,255,0.2); border-radius: var(--radius);
    padding: 20px 24px; display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px; gap: 16px; flex-wrap: wrap;
  }
  .analysis-bar p { font-size: 14px; color: var(--muted); }
  .analysis-bar strong { color: var(--text); }
  .analysis-btns { display: flex; gap: 10px; }

  @media (max-width: 768px) {
    .main { padding: 16px; }
    header { padding: 16px; }
    .form-grid { grid-template-columns: 1fr; }
    .summary-grid { grid-template-columns: 1fr 1fr; }
    th:nth-child(n+5), td:nth-child(n+5) { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📊</div>
    <div>
      <h1>Stock Analyzer</h1>
      <span>Portfolio Manager</span>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" onclick="loadPortfolio()">⟳ Refresh</button>
    <button class="btn btn-primary" onclick="openModal()">+ Add Stock</button>
  </div>
</header>

<div class="main">

  <!-- Summary -->
  <div class="summary-grid">
    <div class="summary-card">
      <div class="label">Total Invested</div>
      <div class="value" id="sum-invested">—</div>
    </div>
    <div class="summary-card">
      <div class="label">Current Value</div>
      <div class="value" id="sum-current">—</div>
    </div>
    <div class="summary-card">
      <div class="label">Overall P&amp;L</div>
      <div class="value" id="sum-pnl">—</div>
      <div class="sub" id="sum-pnl-pct"></div>
    </div>
    <div class="summary-card">
      <div class="label">Holdings</div>
      <div class="value" id="sum-count">—</div>
      <div class="sub" id="sum-exchanges"></div>
    </div>
  </div>

  <!-- Analysis Trigger -->
  <div class="analysis-bar">
    <div>
      <strong>🤖 Run AI Analysis Now</strong>
      <p>Sends a full analysis to your Telegram right away.</p>
    </div>
    <div class="analysis-btns">
      <button class="btn btn-ghost btn-sm" onclick="runAnalysis('morning')">🌅 Morning</button>
      <button class="btn btn-success btn-sm" onclick="runAnalysis('evening')">🌆 Evening</button>
    </div>
  </div>

  <!-- Holdings Table -->
  <div class="section-header">
    <h2>Holdings</h2>
    <span id="last-updated" style="font-size:12px;color:var(--muted)"></span>
  </div>

  <div class="table-wrap">
    <table id="portfolio-table">
      <thead>
        <tr>
          <th>Stock</th>
          <th>Qty</th>
          <th>Buy Price</th>
          <th>Live Price</th>
          <th>P&amp;L</th>
          <th>Sector</th>
          <th style="text-align:right">Actions</th>
        </tr>
      </thead>
      <tbody id="portfolio-body">
        <tr><td colspan="7"><div class="loading-price" style="text-align:center;padding:40px">Loading portfolio…</div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h3 id="modal-title">Add Stock</h3>
    <input type="hidden" id="edit-id">
    <div class="form-grid">
      <div class="form-group">
        <label for="f-symbol">NSE/BSE Symbol *</label>
        <input id="f-symbol" placeholder="e.g. RELIANCE" oninput="onSymbolInput()" style="text-transform:uppercase">
        <div class="lookup-hint" id="lookup-hint"></div>
      </div>
      <div class="form-group">
        <label for="f-exchange">Exchange *</label>
        <select id="f-exchange" onchange="onSymbolInput()">
          <option value="NSE">NSE</option>
          <option value="BSE">BSE</option>
        </select>
      </div>
      <div class="form-group full">
        <label for="f-company">Company Name</label>
        <input id="f-company" placeholder="Auto-filled on lookup">
      </div>
      <div class="form-group">
        <label for="f-qty">Quantity *</label>
        <input id="f-qty" type="number" min="0" step="any" placeholder="10">
      </div>
      <div class="form-group">
        <label for="f-buy">Avg Buy Price (₹) *</label>
        <input id="f-buy" type="number" min="0" step="any" placeholder="2450.00">
      </div>
      <div class="form-group full">
        <label for="f-sector">Sector</label>
        <input id="f-sector" placeholder="e.g. IT, Banking, Energy">
      </div>
      <div class="form-group full">
        <label for="f-notes">Notes (optional)</label>
        <input id="f-notes" placeholder="Any personal notes">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveStock()">Add Stock</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-wrap" id="toast-wrap"></div>

<script>
const fmt = (n) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(n);
const fmtDec = (n) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);

let portfolio = [];
let lookupTimer = null;

// ── Load portfolio ──────────────────────────────────────────────────
async function loadPortfolio() {
  try {
    const res = await fetch('/api/portfolio');
    portfolio = await res.json();
    renderTable(portfolio);
    renderSummary(portfolio);
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-IN');
  } catch(e) {
    toast('Failed to load portfolio: ' + e.message, 'error');
  }
}

// ── Summary ─────────────────────────────────────────────────────────
function renderSummary(data) {
  const invested = data.reduce((s, x) => s + x.buy_price * x.quantity, 0);
  const current  = data.reduce((s, x) => s + (x.live_price || x.buy_price) * x.quantity, 0);
  const pnl      = current - invested;
  const pnlPct   = invested ? ((pnl / invested) * 100) : 0;

  document.getElementById('sum-invested').textContent = fmt(invested);
  document.getElementById('sum-current').textContent  = fmt(current);
  document.getElementById('sum-pnl').textContent      = (pnl >= 0 ? '+' : '') + fmt(pnl);
  document.getElementById('sum-pnl').className        = 'value ' + (pnl >= 0 ? 'up' : 'down');
  document.getElementById('sum-pnl-pct').textContent  = (pnlPct >= 0 ? '+' : '') + pnlPct.toFixed(2) + '%';
  document.getElementById('sum-count').textContent    = data.length + ' stocks';

  const exchanges = [...new Set(data.map(x => x.exchange))];
  document.getElementById('sum-exchanges').textContent = exchanges.join(' · ');
}

// ── Table ────────────────────────────────────────────────────────────
function renderTable(data) {
  const tbody = document.getElementById('portfolio-body');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">
      <div class="icon">📭</div>
      <p>No stocks yet. Add your first holding!</p>
      <button class="btn btn-primary" onclick="openModal()">+ Add Stock</button>
    </div></td></tr>`;
    return;
  }

  tbody.innerHTML = data.map(s => {
    const pnlClass = (s.pnl_pct >= 0) ? 'pnl-up' : 'pnl-down';
    const sign     = (s.pnl_pct >= 0) ? '+' : '';
    return `<tr>
      <td>
        <div class="symbol-cell">${s.symbol}<span class="exchange-badge">${s.exchange}</span></div>
        <div class="company-name">${s.company_name}</div>
      </td>
      <td>${s.quantity}</td>
      <td>${fmtDec(s.buy_price)}</td>
      <td class="live-price">${s.live_price ? fmtDec(s.live_price) : '<span class="loading-price">loading…</span>'}</td>
      <td class="${pnlClass}">
        ${s.pnl ? (sign + fmt(s.pnl)) : '—'}<br>
        <span style="font-size:12px">${s.pnl_pct ? (sign + s.pnl_pct.toFixed(2) + '%') : ''}</span>
      </td>
      <td>${s.sector ? `<span class="sector-tag">${s.sector}</span>` : '<span style="color:var(--muted)">—</span>'}</td>
      <td style="text-align:right">
        <button class="btn btn-ghost btn-sm" onclick='editStock(${JSON.stringify(s)})' style="margin-right:6px">✏️ Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteStock('${s.id}','${s.symbol}')">🗑</button>
      </td>
    </tr>`;
  }).join('');
}

// ── Modal ────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal-title').textContent = 'Add Stock';
  document.getElementById('modal-save-btn').textContent = 'Add Stock';
  document.getElementById('edit-id').value = '';
  ['f-symbol','f-company','f-qty','f-buy','f-sector','f-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-exchange').value = 'NSE';
  document.getElementById('lookup-hint').textContent = '';
  document.getElementById('lookup-hint').className = 'lookup-hint';
  document.getElementById('modal-overlay').classList.add('active');
  setTimeout(() => document.getElementById('f-symbol').focus(), 100);
}

function editStock(s) {
  document.getElementById('modal-title').textContent = 'Edit Stock';
  document.getElementById('modal-save-btn').textContent = 'Save Changes';
  document.getElementById('edit-id').value = s.id;
  document.getElementById('f-symbol').value   = s.symbol;
  document.getElementById('f-exchange').value  = s.exchange;
  document.getElementById('f-company').value   = s.company_name;
  document.getElementById('f-qty').value       = s.quantity;
  document.getElementById('f-buy').value       = s.buy_price;
  document.getElementById('f-sector').value    = s.sector || '';
  document.getElementById('f-notes').value     = s.notes || '';
  document.getElementById('lookup-hint').textContent = '';
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ── Symbol Lookup ─────────────────────────────────────────────────────
function onSymbolInput() {
  clearTimeout(lookupTimer);
  const sym = document.getElementById('f-symbol').value.trim().toUpperCase();
  document.getElementById('f-symbol').value = sym;
  const hint = document.getElementById('lookup-hint');
  if (sym.length < 2) { hint.textContent = ''; return; }
  hint.className = 'lookup-hint'; hint.textContent = '🔍 Looking up…';
  lookupTimer = setTimeout(() => lookupSymbol(sym), 700);
}

async function lookupSymbol(sym) {
  const exchange = document.getElementById('f-exchange').value;
  const hint = document.getElementById('lookup-hint');
  try {
    const res  = await fetch(`/api/lookup/${sym}?exchange=${exchange}`);
    const data = await res.json();
    if (data.valid) {
      hint.className = 'lookup-hint lookup-ok';
      hint.textContent = `✅ ${data.company_name} — ₹${data.live_price}`;
      if (!document.getElementById('f-company').value) document.getElementById('f-company').value = data.company_name;
      if (!document.getElementById('f-sector').value && data.sector) document.getElementById('f-sector').value = data.sector;
    } else {
      hint.className = 'lookup-hint lookup-err';
      hint.textContent = '❌ Symbol not found on ' + exchange;
    }
  } catch(e) {
    hint.className = 'lookup-hint lookup-err';
    hint.textContent = '⚠️ Lookup failed';
  }
}

// ── Save ──────────────────────────────────────────────────────────────
async function saveStock() {
  const id  = document.getElementById('edit-id').value;
  const btn = document.getElementById('modal-save-btn');
  const payload = {
    symbol:       document.getElementById('f-symbol').value.trim().toUpperCase(),
    exchange:     document.getElementById('f-exchange').value,
    company_name: document.getElementById('f-company').value.trim(),
    quantity:     parseFloat(document.getElementById('f-qty').value),
    buy_price:    parseFloat(document.getElementById('f-buy').value),
    sector:       document.getElementById('f-sector').value.trim(),
    notes:        document.getElementById('f-notes').value.trim(),
  };
  if (!payload.symbol || isNaN(payload.quantity) || isNaN(payload.buy_price)) {
    toast('Please fill in all required fields.', 'error'); return;
  }
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const url = id ? `/api/portfolio/${id}` : '/api/portfolio';
    const method = id ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const data = await res.json();
    if (!res.ok) { toast(data.error || 'Save failed', 'error'); return; }
    toast(id ? `${payload.symbol} updated!` : `${payload.symbol} added!`, 'success');
    closeModal();
    loadPortfolio();
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = id ? 'Save Changes' : 'Add Stock';
  }
}

// ── Delete ────────────────────────────────────────────────────────────
async function deleteStock(id, symbol) {
  if (!confirm(`Remove ${symbol} from your portfolio?`)) return;
  try {
    const res = await fetch(`/api/portfolio/${id}`, { method: 'DELETE' });
    if (res.ok) { toast(`${symbol} removed.`, 'info'); loadPortfolio(); }
    else toast('Delete failed', 'error');
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

// ── Run Analysis ──────────────────────────────────────────────────────
async function runAnalysis(session) {
  if (!portfolio.length) { toast('Add some stocks first!', 'error'); return; }
  toast(`🚀 Starting ${session} analysis… check Telegram in ~30 seconds.`, 'info');
  try {
    const res  = await fetch('/api/run-analysis', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({session}) });
    const data = await res.json();
    if (data.ok) toast(data.message, 'success');
    else toast('Error: ' + data.error, 'error');
  } catch(e) { toast('Failed to trigger analysis', 'error'); }
}

// ── Toast ─────────────────────────────────────────────────────────────
function toast(msg, type='info') {
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transform='translateX(40px)'; el.style.transition='all .3s'; setTimeout(()=>el.remove(), 300); }, 4000);
}

// ── Keyboard shortcuts ────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('active')) saveStock();
});

// Init
loadPortfolio();
</script>
